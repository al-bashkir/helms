apiVersion: v2
name: netbird
description: A Helm chart for deploying NetBird VPN management, signal, dashboard, and relay services on Kubernetes
type: application
version: 0.6.0
appVersion: "0.68.3"
keywords:
  - netbird
  - vpn
  - wireguard
  - mesh
  - networking
  - self-hosted
  - kubernetes
home: https://netbird.io
sources:
  - https://github.com/netbirdio/netbird
  - https://github.com/KitStream/helms
maintainers:
  - name: KitStream
    url: https://github.com/KitStream
icon: https://raw.githubusercontent.com/netbirdio/netbird/main/docs/media/logo-full.png
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: NetBird
      url: https://netbird.io
    - name: Source
      url: https://github.com/KitStream/helms
    - name: Initium
      url: https://github.com/KitStream/initium
  artifacthub.io/changes: |
    - kind: added
      description: server.relaySidecar.livenessProbe and readinessProbe overrides for the relay sidecar
    - kind: fixed
      description: relay sidecar bootstrap deadlock when tls.enabled — chart defaults to a tcpSocket probe on the relay port
    - kind: added
      description: Relay sidecar TLS (Secret or Let's Encrypt) — silences QUIC listener warning and enables QUIC for peers
    - kind: added
      description: relayUdpService and relayUdpRoute for exposing QUIC/UDP/443
    - kind: added
      description: server.service.relayQuicUdpPort to share a LoadBalancer IP across HTTP, relay TCP, and relay QUIC
    - kind: changed
      description: nginx ssl-passthrough auto-injected on ingressRelay when relay TLS is enabled
