apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbird.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include "netbird.server.configTemplate" . | sha256sum }}
{{- if and .Values.pat.enabled (eq .Values.database.type "sqlite") }}
        checksum/pat-seed: {{ include "netbird.pat.seedSpec" . | sha256sum }}
{{- end }}
{{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
{{- end }}
      labels:
        {{- include "netbird.server.selectorLabels" . | nindent 8 }}
{{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ include "netbird.serviceAccountName" . }}
{{- with (coalesce .Values.server.imagePullSecrets .Values.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.server.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- $generated := include "netbird.server.generatedSecretName" . }}
{{- $authSecretName := include "netbird.server.resolveSecretName" (dict "ref" .Values.server.secrets.authSecret "generated" $generated) }}
{{- $encKeySecretName := include "netbird.server.resolveSecretName" (dict "ref" .Values.server.secrets.storeEncryptionKey "generated" $generated) }}
{{- $isExternal := eq (include "netbird.database.isExternal" .) "true" }}
{{- $patSidecar := and .Values.pat.enabled (not $isExternal) }}
      initContainers:
{{- if $isExternal }}
        # ── Wait for database to be reachable ──────────────────────────
        - name: db-wait
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - wait-for
            - --target
            - "tcp://{{ .Values.database.host }}:{{ include "netbird.database.port" . }}"
            - --timeout
            - "120s"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
        # ── Create database if missing ─────────────────────────────────
        - name: db-seed
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - seed
            - --spec
            - /spec/seed.yaml
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret.secretName }}
                  key: {{ .Values.database.passwordSecret.secretKey }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config-tpl
              mountPath: /spec
              readOnly: true
{{- end }}
        # ── Render config template ─────────────────────────────────────
        - name: config-init
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - render
            - --template
            - /tpl/config.yaml.tpl
            - --output
            - config.yaml
            - --workdir
            - /out
          env:
            - name: DOLLAR
              value: "$"
{{- if $authSecretName }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $authSecretName }}
                  key: {{ .Values.server.secrets.authSecret.secretKey }}
{{- else }}
            - name: AUTH_SECRET
              value: ""
{{- end }}
{{- if $encKeySecretName }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $encKeySecretName }}
                  key: {{ .Values.server.secrets.storeEncryptionKey.secretKey }}
{{- else }}
            - name: ENCRYPTION_KEY
              value: ""
{{- end }}
{{- if $isExternal }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret.secretName }}
                  key: {{ .Values.database.passwordSecret.secretKey }}
{{- end }}
{{- if and .Values.oidc.enabled .Values.oidc.idpManager.enabled .Values.oidc.idpManager.clientConfig.clientSecret.secretName }}
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.idpManager.clientConfig.clientSecret.secretName }}
                  key: {{ .Values.oidc.idpManager.clientConfig.clientSecret.secretKey }}
{{- end }}
{{- if and .Values.oidc.enabled .Values.oidc.pkceAuthFlow.enabled .Values.oidc.pkceAuthFlow.providerConfig.clientSecret.secretName }}
            - name: PKCE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.pkceAuthFlow.providerConfig.clientSecret.secretName }}
                  key: {{ .Values.oidc.pkceAuthFlow.providerConfig.clientSecret.secretKey }}
{{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config-tpl
              mountPath: /tpl
              readOnly: true
            - name: config-generated
              mountPath: /out
{{- if $patSidecar }}
        # ── PAT seed native sidecar (SQLite only) ────────────────────────
        # Declared as an init container with restartPolicy: Always, making
        # it a Kubernetes native sidecar (K8s 1.28+). It starts alongside
        # the server and stays alive after seeding (--sidecar flag).
        # Required because ReadWriteOnce PVCs do not support multi-pod
        # attach, so a separate Job cannot mount the PVC.
        - name: pat-seed
          restartPolicy: Always
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - --sidecar
            - seed
            - --spec
            - /spec/pat-seed.yaml
          env:
            - name: PAT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pat.secret.secretName }}
                  key: {{ .Values.pat.secret.tokenKey }}
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: pat-seed-config
              mountPath: /spec
              readOnly: true
            - name: data
              mountPath: /var/lib/netbird
        # ── API provisioning sidecar (SQLite only) ──────────────────────
        # Creates the "All" group and default policy via the REST API after
        # the PAT seed completes. Runs as a native sidecar so it can wait
        # for the server to be ready. The script is idempotent.
        - name: api-provision
          restartPolicy: Always
          image: alpine:3.20
          command: ["sh", "-c", "sh /spec/provision.sh; sleep infinity"]
          env:
            - name: PAT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pat.secret.secretName }}
                  key: {{ .Values.pat.secret.tokenKey }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: pat-seed-config
              mountPath: /spec
              readOnly: true
{{- end }}
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args:
            - --config
            - /etc/netbird/config.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: stun
              containerPort: {{ .Values.server.stunPort }}
              protocol: UDP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: config-generated
              mountPath: /etc/netbird/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/netbird
{{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.server.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.server.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- if and .Values.server.config.relays.enabled .Values.server.config.relays.embedded.enabled }}
        - name: relay
          image: "{{ .Values.server.relaySidecar.image.repository }}:{{ .Values.server.relaySidecar.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.relaySidecar.image.pullPolicy }}
          env:
            - name: NB_LISTEN_ADDRESS
              value: ":{{ .Values.server.relaySidecar.listenPort }}"
            - name: NB_HEALTH_LISTEN_ADDRESS
              value: ":{{ .Values.server.relaySidecar.healthcheckPort }}"
            - name: NB_EXPOSED_ADDRESS
              value: {{ include "netbird.relays.embeddedAddress" . | quote }}
{{- if $authSecretName }}
            - name: NB_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $authSecretName }}
                  key: {{ .Values.server.secrets.authSecret.secretKey }}
{{- else }}
            - name: NB_AUTH_SECRET
              value: ""
{{- end }}
          ports:
            - name: relay
              containerPort: {{ .Values.server.relaySidecar.listenPort }}
              protocol: TCP
            - name: relay-health
              containerPort: {{ .Values.server.relaySidecar.healthcheckPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: relay-health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: relay-health
            initialDelaySeconds: 5
            periodSeconds: 10
{{- with .Values.server.relaySidecar.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.server.relaySidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- end }}
      volumes:
        - name: config-tpl
          configMap:
            name: {{ include "netbird.server.fullname" . }}
        - name: config-generated
          emptyDir: {}
{{- if $patSidecar }}
        - name: pat-seed-config
          configMap:
            name: {{ include "netbird.server.fullname" . }}-pat-seed
{{- end }}
        - name: data
{{- if .Values.server.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "netbird.server.fullname" . }}
{{- else }}
          emptyDir: {}
{{- end }}
{{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
{{- end }}

