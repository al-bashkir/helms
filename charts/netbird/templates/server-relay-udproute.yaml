{{- if .Values.server.relayUdpRoute.enabled }}
{{- $serviceName := printf "%s-relay-udp" (include "netbird.server.fullname" .) }}
{{- $port := int .Values.server.relayUdpService.port }}
{{- $rules := list }}
{{- range .Values.server.relayUdpRoute.rules }}
  {{- $rule := deepCopy . }}
  {{- if not (hasKey $rule "backendRefs") }}
    {{- $_ := set $rule "backendRefs" (list (dict "name" $serviceName "port" $port)) }}
  {{- end }}
  {{- $rules = append $rules $rule }}
{{- end }}
{{- if not $rules }}
  {{- $rules = list (dict "backendRefs" (list (dict "name" $serviceName "port" $port))) }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: {{ include "netbird.server.fullname" . }}-relay-udp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.server.labels" . | nindent 4 }}
    {{- with .Values.server.relayUdpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.server.relayUdpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.server.relayUdpRoute.parentRefs | nindent 4 }}
  rules:
    {{- toYaml $rules | nindent 4 }}
{{- end }}
