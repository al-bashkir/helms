{{/*
Helm test pod — verifies that the server and dashboard services are
reachable from within the cluster and that the server API responds
correctly. Runs on `helm test <release>`.
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "netbird.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.37
      command: ['sh', '-c']
      args:
        - |
          set -e
          FAIL=0

          echo "==> Testing server /api/instance endpoint..."
          RESPONSE=$(wget -qO- --timeout=10 http://{{ include "netbird.server.fullname" . }}:{{ .Values.server.service.port }}/api/instance 2>&1) || {
            echo "FAIL: could not reach server /api/instance"
            FAIL=1
          }
          if [ "$FAIL" -eq 0 ]; then
            echo "Response: $RESPONSE"
            case "$RESPONSE" in
              *setup_required*)
                echo "PASS: server API returned setup_required (fresh instance confirmed)"
                ;;
              *)
                echo "FAIL: unexpected response from /api/instance: $RESPONSE"
                FAIL=1
                ;;
            esac
          fi

          echo ""
          echo "==> Testing dashboard service..."
          wget -qO- --timeout=10 http://{{ include "netbird.dashboard.fullname" . }}:{{ .Values.dashboard.service.port }}/ > /dev/null 2>&1 || {
            echo "FAIL: could not reach dashboard service"
            FAIL=1
          }
          if [ "$FAIL" -eq 0 ]; then
            echo "PASS: dashboard service is reachable"
          fi

{{- if .Values.server.relaySidecar.tls.enabled }}
          echo ""
          echo "==> Testing relay TLS handshake on {{ .Values.server.relaySidecar.listenPort }}..."
          # busybox lacks openssl; this probe just confirms TCP reachability.
          # Full TLS handshake is verified in the e2e-relay-tls script.
          nc -z -w5 {{ include "netbird.server.fullname" . }} {{ .Values.server.relaySidecar.listenPort }} || {
            echo "FAIL: could not reach relay TLS port {{ .Values.server.relaySidecar.listenPort }}"
            FAIL=1
          }
          if [ "$FAIL" -eq 0 ]; then
            echo "PASS: relay TLS port reachable"
          fi
{{- end }}

          echo ""
          if [ "$FAIL" -ne 0 ]; then
            echo "Some tests FAILED"
            exit 1
          fi
          echo "All tests PASSED"
