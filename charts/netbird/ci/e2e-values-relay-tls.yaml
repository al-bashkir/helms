# E2E values for exercising relay TLS on a kind cluster. Uses
# ClusterIP for the UDP service since kind has no LoadBalancer
# implementation. The cert is a self-signed RSA keypair generated
# by the e2e script and provided as a kubernetes.io/tls Secret.

database:
  type: sqlite

server:
  persistentVolume:
    enabled: false

  stunService:
    type: ClusterIP

  config:
    # exposedAddress is required by the validator. The relay sidecar's
    # healthcheck dials its own advertised URL — but during startup the
    # Service has no Ready endpoints (Pod is still Pending), so it must
    # bypass the Service. Use `localhost` so the dial loops back to the
    # container's own listener; the self-signed cert is generated with a
    # `localhost` SAN to match.
    exposedAddress: "https://relay.test:443"
    relays:
      enabled: true
      embedded:
        enabled: true
        address: "rels://localhost:33080/relay"

  livenessProbe:
    failureThreshold: 10
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    tcpSocket:
      port: http
  readinessProbe:
    failureThreshold: 10
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    tcpSocket:
      port: http

  relaySidecar:
    tls:
      enabled: true
      source: secret
      secret:
        secretName: relay-tls-selfsigned

  relayUdpService:
    enabled: true
    type: ClusterIP
    port: 443
