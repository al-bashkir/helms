suite: server configmap tests
templates:
  - templates/server-configmap.yaml
tests:
  - it: should render a ConfigMap
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap

  - it: should match default config snapshot
    asserts:
      - matchSnapshot:
          path: data

  - it: should render listen address from values
    set:
      server.config.listenAddress: ":8080"
    asserts:
      - matchSnapshot:
          path: data

  - it: should render exposed address from values
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
    asserts:
      - matchSnapshot:
          path: data

  - it: should fail when exposedAddress is missing a port
    set:
      server.config.exposedAddress: "https://netbird.example.com"
    asserts:
      - failedTemplate:
          errorPattern: "must include an explicit port"

  - it: should fail when exposedAddress is missing port (http scheme)
    set:
      server.config.exposedAddress: "http://netbird.example.com/path"
    asserts:
      - failedTemplate:
          errorPattern: "must include an explicit port"

  - it: should accept exposedAddress with explicit port and trailing slash
    set:
      server.config.exposedAddress: "https://netbird.example.com:443/"
    asserts:
      - hasDocuments:
          count: 1

  - it: should accept exposedAddress with bracketed IPv6 host and port
    set:
      server.config.exposedAddress: "https://[2001:db8::1]:443"
    asserts:
      - hasDocuments:
          count: 1

  - it: should accept empty exposedAddress (validation only fires when set)
    set:
      server.config.exposedAddress: ""
    asserts:
      - hasDocuments:
          count: 1

  - it: should render auth issuer from values
    set:
      server.config.auth.issuer: "https://auth.example.com"
    asserts:
      - matchSnapshot:
          path: data

  - it: should render sqlite engine with empty DSN
    set:
      database.type: sqlite
    asserts:
      - matchSnapshot:
          path: data

  - it: should render postgres engine with constructed DSN
    set:
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-pg-secret
    asserts:
      - matchSnapshot:
          path: data

  - it: should render mysql engine with constructed DSN
    set:
      database.type: mysql
      database.host: mysql.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-mysql-secret
    asserts:
      - matchSnapshot:
          path: data

  - it: should include seed.yaml for postgresql
    set:
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-pg-secret
    asserts:
      - matchSnapshot:
          path: data

  - it: should not include seed.yaml for sqlite
    set:
      database.type: sqlite
    asserts:
      - matchSnapshot:
          path: data

  - it: should render dashboard redirect URIs
    set:
      server.config.auth.dashboardRedirectURIs:
        - "https://netbird.example.com/nb-auth"
        - "https://netbird.example.com/nb-silent-auth"
    asserts:
      - matchSnapshot:
          path: data

  - it: should escape dollar signs in user-supplied values
    set:
      server.config.listenAddress: ":80$test"
    asserts:
      - matchSnapshot:
          path: data

  - it: should include common labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server

  # ── OIDC configuration ────────────────────────────────────────────────

  - it: should not render OIDC sections when oidc.enabled is false
    asserts:
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "idpConfig:"
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "deviceAuthFlow:"
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "pkceAuthFlow:"

  - it: should render http section when oidc is enabled
    set:
      oidc.enabled: true
      oidc.audience: "my-api"
      oidc.userIdClaim: "email"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'authAudience: "my-api"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'authUserIDClaim: "email"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "idpSignKeyRefreshEnabled: true"

  - it: should render oidcConfigEndpoint when set
    set:
      oidc.enabled: true
      oidc.configEndpoint: "https://auth.example.com/.well-known/openid-configuration"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'oidcConfigEndpoint: "https://auth\.example\.com/\.well-known/openid-configuration"'

  - it: should not render oidcConfigEndpoint when empty
    set:
      oidc.enabled: true
    asserts:
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "oidcConfigEndpoint:"

  - it: should render authKeysLocation when set
    set:
      oidc.enabled: true
      oidc.authKeysLocation: "https://auth.example.com/.well-known/jwks.json"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'authKeysLocation: "https://auth\.example\.com/\.well-known/jwks\.json"'

  - it: should render deviceAuthFlow when enabled
    set:
      oidc.enabled: true
      oidc.deviceAuthFlow.enabled: true
      oidc.deviceAuthFlow.provider: "keycloak"
      oidc.deviceAuthFlow.providerConfig.clientId: "cli-client"
      oidc.deviceAuthFlow.providerConfig.domain: "auth.example.com"
      oidc.deviceAuthFlow.providerConfig.audience: "my-api"
      oidc.deviceAuthFlow.providerConfig.tokenEndpoint: "https://auth.example.com/token"
      oidc.deviceAuthFlow.providerConfig.deviceAuthEndpoint: "https://auth.example.com/device"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'provider: "keycloak"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'clientId: "cli-client"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'domain: "auth\.example\.com"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'audience: "my-api"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'tokenEndpoint: "https://auth\.example\.com/token"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'deviceAuthEndpoint: "https://auth\.example\.com/device"'

  - it: should not render deviceAuthFlow when disabled
    set:
      oidc.enabled: true
      oidc.deviceAuthFlow.enabled: false
    asserts:
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "deviceAuthFlow:"

  - it: should render pkceAuthFlow with plain-text client secret
    set:
      oidc.enabled: true
      oidc.pkceAuthFlow.enabled: true
      oidc.pkceAuthFlow.providerConfig.clientId: "dashboard"
      oidc.pkceAuthFlow.providerConfig.clientSecret.value: "my-plain-secret"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "pkceAuthFlow:"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'clientSecret: "my-plain-secret"'

  - it: should render pkceAuthFlow with secret ref placeholder
    set:
      oidc.enabled: true
      oidc.pkceAuthFlow.enabled: true
      oidc.pkceAuthFlow.providerConfig.clientId: "dashboard"
      oidc.pkceAuthFlow.providerConfig.clientSecret.secretName: my-pkce-secret
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'clientSecret: "\$\{PKCE_CLIENT_SECRET\}"'

  - it: should render pkceAuthFlow redirectURLs
    set:
      oidc.enabled: true
      oidc.pkceAuthFlow.enabled: true
      oidc.pkceAuthFlow.providerConfig.clientId: "dashboard"
      oidc.pkceAuthFlow.providerConfig.redirectUrls:
        - "https://netbird.example.com/nb-auth"
        - "https://netbird.example.com/nb-silent-auth"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "redirectURLs:"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: '"https://netbird\.example\.com/nb-auth"'

  - it: should render idpConfig with keycloak provider credentials key
    set:
      oidc.enabled: true
      oidc.idpManager.enabled: true
      oidc.idpManager.managerType: "keycloak"
      oidc.idpManager.clientConfig.issuer: "https://kc.example.com/realms/nb"
      oidc.idpManager.clientConfig.tokenEndpoint: "https://kc.example.com/realms/nb/protocol/openid-connect/token"
      oidc.idpManager.clientConfig.clientId: "backend"
      oidc.idpManager.clientConfig.clientSecret.secretName: my-kc-secret
      oidc.idpManager.providerConfig:
        adminEndpoint: "https://kc.example.com/admin/realms/nb"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'managerType: "keycloak"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'clientSecret: "\$\{IDP_CLIENT_SECRET\}"'
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "keycloakClientCredentials:"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "adminEndpoint:"

  - it: should render auth0ClientCredentials for auth0 manager type
    set:
      oidc.enabled: true
      oidc.idpManager.enabled: true
      oidc.idpManager.managerType: "auth0"
      oidc.idpManager.clientConfig.issuer: "https://tenant.auth0.com/"
      oidc.idpManager.clientConfig.tokenEndpoint: "https://tenant.auth0.com/oauth/token"
      oidc.idpManager.clientConfig.clientId: "m2m-client"
      oidc.idpManager.clientConfig.clientSecret.secretName: my-auth0-secret
      oidc.idpManager.providerConfig:
        Audience: "https://tenant.auth0.com/api/v2/"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "auth0ClientCredentials:"
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "keycloakClientCredentials:"

  - it: should render azureClientCredentials for azure manager type
    set:
      oidc.enabled: true
      oidc.idpManager.enabled: true
      oidc.idpManager.managerType: "azure"
      oidc.idpManager.clientConfig.issuer: "https://login.microsoftonline.com/tenant/v2.0"
      oidc.idpManager.clientConfig.tokenEndpoint: "https://login.microsoftonline.com/tenant/oauth2/v2.0/token"
      oidc.idpManager.clientConfig.clientId: "client-id"
      oidc.idpManager.clientConfig.clientSecret.secretName: my-azure-secret
      oidc.idpManager.providerConfig:
        ObjectID: "service-principal-oid"
        GraphAPIEndpoint: "https://graph.microsoft.com"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "azureClientCredentials:"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "ObjectID: service-principal-oid"

  - it: should render idpManager extraConfig
    set:
      oidc.enabled: true
      oidc.idpManager.enabled: true
      oidc.idpManager.managerType: "keycloak"
      oidc.idpManager.clientConfig.issuer: "https://kc.example.com"
      oidc.idpManager.clientConfig.tokenEndpoint: "https://kc.example.com/token"
      oidc.idpManager.clientConfig.clientId: "backend"
      oidc.idpManager.clientConfig.clientSecret.secretName: my-secret
      oidc.idpManager.extraConfig:
        customKey: "customValue"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "extraConfig:"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "customKey: customValue"

  - it: should escape dollar signs in OIDC values
    set:
      oidc.enabled: true
      oidc.audience: "my$api"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: 'authAudience: "my\$\{DOLLAR\}api"'

  # ── Route mutual-exclusion validation ─────────────────────────────────

  - it: should fail when server ingress and httpRoute are both enabled
    set:
      server.ingress.enabled: true
      server.httpRoute.enabled: true
      server.httpRoute.parentRefs:
        - name: gw
    asserts:
      - failedTemplate:
          errorPattern: "server.ingress.enabled and server.httpRoute.enabled are mutually exclusive"

  - it: should fail when server ingressGrpc and grpcRoute are both enabled
    set:
      server.ingressGrpc.enabled: true
      server.grpcRoute.enabled: true
      server.grpcRoute.parentRefs:
        - name: gw
    asserts:
      - failedTemplate:
          errorPattern: "server.ingressGrpc.enabled and server.grpcRoute.enabled are mutually exclusive"

  - it: should fail when server ingressRelay and relayHttpRoute are both enabled
    set:
      server.ingressRelay.enabled: true
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
    asserts:
      - failedTemplate:
          errorPattern: "conflicts with server.relayHttpRoute/relayTcpRoute"

  - it: should fail when server relayHttpRoute and relayTcpRoute are both enabled
    set:
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
      server.relayTcpRoute.enabled: true
      server.relayTcpRoute.parentRefs:
        - name: gw
    asserts:
      - failedTemplate:
          errorPattern: "server.relayHttpRoute.enabled and server.relayTcpRoute.enabled are mutually exclusive"

  - it: should fail when dashboard ingress and httpRoute are both enabled
    set:
      dashboard.ingress.enabled: true
      dashboard.httpRoute.enabled: true
      dashboard.httpRoute.parentRefs:
        - name: gw
    asserts:
      - failedTemplate:
          errorPattern: "dashboard.ingress.enabled and dashboard.httpRoute.enabled are mutually exclusive"

  - it: should fail when httpRoute enabled without parentRefs
    set:
      server.httpRoute.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "server.httpRoute.parentRefs is empty"

  - it: should fail when ingressGrpc is enabled without TLS
    set:
      server.ingressGrpc.enabled: true
      server.ingressGrpc.hosts:
        - host: netbird.example.com
          paths:
            - path: /signalexchange.SignalExchange
    asserts:
      - failedTemplate:
          errorPattern: "server.ingressGrpc.tls is empty"

  - it: should accept ingressGrpc when TLS is configured
    set:
      server.ingressGrpc.enabled: true
      server.ingressGrpc.hosts:
        - host: netbird.example.com
          paths:
            - path: /signalexchange.SignalExchange
      server.ingressGrpc.tls:
        - secretName: netbird-tls
          hosts:
            - netbird.example.com
    asserts:
      - hasDocuments:
          count: 1

  - it: should not render relays block when relays.enabled is false
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
    asserts:
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "(?m)^\\s*relays:"

  - it: should render relays block with auto-derived embedded address
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "(?m)^\\s*relays:"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://netbird.example.com:443/relay"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "credentialsTTL: \"24h\""
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "secret: \"\\$\\{AUTH_SECRET\\}\""

  - it: should respect relays.embedded.address override
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.address: "rels://relay.example.com:443/relay"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://relay.example.com:443/relay"
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://netbird.example.com:443/relay"

  - it: should append external relays after the embedded URL
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.external:
        - "rels://relay-eu.example.com:443/relay"
        - "rels://relay-us.example.com:443/relay"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://netbird.example.com:443/relay"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://relay-eu.example.com:443/relay"
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://relay-us.example.com:443/relay"

  - it: should render external relays only when embedded sidecar is disabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: false
      server.config.relays.external:
        - "rels://relay-eu.example.com:443/relay"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://relay-eu.example.com:443/relay"
      - notMatchRegex:
          path: data["config.yaml.tpl"]
          pattern: "rels://netbird.example.com:443/relay"

  - it: should fail when relays.enabled but no addresses (embedded off + empty external)
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: false
      server.config.relays.external: []
    asserts:
      - failedTemplate:
          errorPattern: "requires at least one address"

  - it: should fail when embedded enabled but no exposedAddress and no override
    set:
      server.config.exposedAddress: ""
      server.config.relays.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "requires server.config.exposedAddress"

  - it: should fail on external relay with bad scheme
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.external:
        - "https://bad.example.com:443/relay"
    asserts:
      - failedTemplate:
          errorPattern: "must be a rels:// or rel:// URL with explicit port"

  - it: should fail on external relay missing port
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.external:
        - "rels://nport.example.com/relay"
    asserts:
      - failedTemplate:
          errorPattern: "must be a rels:// or rel:// URL with explicit port"

  - it: should fail on bad credentialsTTL
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.credentialsTTL: "garbage"
    asserts:
      - failedTemplate:
          errorPattern: "credentialsTTL"

  - it: should accept compound credentialsTTL like 1h30m
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.credentialsTTL: "1h30m"
    asserts:
      - matchRegex:
          path: data["config.yaml.tpl"]
          pattern: "credentialsTTL: \"1h30m\""

  - it: should fail when sidecar listenPort collides with main service port
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.relaySidecar.listenPort: 80
    asserts:
      - failedTemplate:
          errorPattern: "relaySidecar.listenPort.*collides"

  - it: should fail when sidecar metricsPort collides with server metricsPort
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.relaySidecar.metricsPort: 9090
    asserts:
      - failedTemplate:
          errorPattern: "relaySidecar.metricsPort.*collides with server.config.metricsPort"

  - it: should fail when sidecar metricsPort collides with sidecar listenPort
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.relaySidecar.metricsPort: 33080
    asserts:
      - failedTemplate:
          errorPattern: "relaySidecar.listenPort.*collides with server.relaySidecar.metricsPort"

  - it: should fail when sidecar metricsPort collides with sidecar healthcheckPort
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.relaySidecar.metricsPort: 9001
    asserts:
      - failedTemplate:
          errorPattern: "relaySidecar.healthcheckPort.*collides with server.relaySidecar.metricsPort"

  - it: should fail when external-only mode with relay route still enabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: false
      server.config.relays.external:
        - "rels://r.example.com:443/relay"
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
              pathType: ImplementationSpecific
      server.ingressRelay.tls:
        - secretName: x
          hosts: [netbird.example.com]
    asserts:
      - failedTemplate:
          errorPattern: "external-only mode"
