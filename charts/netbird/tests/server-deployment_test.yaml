suite: server deployment tests
templates:
  - templates/server-deployment.yaml
tests:
  - it: should render a Deployment
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment

  - it: should use default image from appVersion
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "netbirdio/netbird-server:0.68.3"

  - it: should use custom image tag when set
    set:
      server.image.tag: "1.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "netbirdio/netbird-server:1.0.0"

  - it: should set replica count
    set:
      server.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should include selector labels
    asserts:
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server

  - it: should include pod labels
    asserts:
      - isSubset:
          path: spec.template.metadata.labels
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server

  - it: should add custom pod annotations
    set:
      server.podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            prometheus.io/scrape: "true"

  - it: should add custom pod labels
    set:
      server.podLabels:
        custom-label: custom-value
    asserts:
      - isSubset:
          path: spec.template.metadata.labels
          content:
            custom-label: custom-value

  - it: should include config checksum annotation
    asserts:
      - exists:
          path: spec.template.metadata.annotations.checksum/config

  - it: should expose http, stun, metrics, and health ports
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 80
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: stun
            containerPort: 3478
            protocol: UDP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9090
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: health
            containerPort: 9000
            protocol: TCP

  - it: should mount config and data volumes
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-generated
            mountPath: /etc/netbird/config.yaml
            subPath: config.yaml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/lib/netbird

  - it: should use PVC when persistentVolume is enabled
    set:
      server.persistentVolume.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-netbird-server

  - it: should use emptyDir when persistentVolume is disabled
    set:
      server.persistentVolume.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  # ── Init container: config-init ──────────────────────────────────────

  - it: should use config-init container with initium image
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: config-init
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "ghcr.io/kitstream/initium:2.1.0"

  - it: should have only config-init for sqlite without pat
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: config-init

  - it: should inject auto-generated secrets via env vars by default
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: AUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-netbird-server-generated
                key: authSecret
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-netbird-server-generated
                key: encryptionKey

  - it: should inject external secrets via env vars when secretName is set
    set:
      server.secrets.authSecret.secretName: my-external-secret
      server.secrets.authSecret.autoGenerate: false
      server.secrets.storeEncryptionKey.secretName: my-enc-secret
      server.secrets.storeEncryptionKey.autoGenerate: false
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: AUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: my-external-secret
                key: authSecret
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: my-enc-secret
                key: encryptionKey

  - it: should not inject DB_PASSWORD env var for sqlite
    asserts:
      - notContains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: DB_PASSWORD
          any: true

  # ── Init containers: db-wait + db-seed for external DB ───────────────

  - it: should add db-wait and db-seed init containers for postgresql
    set:
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-pg-secret
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 3
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: db-wait
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: db-seed
      - equal:
          path: spec.template.spec.initContainers[2].name
          value: config-init

  - it: should add db-wait and db-seed init containers for mysql
    set:
      database.type: mysql
      database.host: mysql.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-mysql-secret
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 3
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: db-wait
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: db-seed
      - equal:
          path: spec.template.spec.initContainers[2].name
          value: config-init

  - it: should configure db-wait with correct target for postgresql
    set:
      database.type: postgresql
      database.host: pg.example.com
      database.port: 5432
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-pg-secret
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: "tcp://pg.example.com:5432"

  - it: should configure db-wait with default port for mysql
    set:
      database.type: mysql
      database.host: mysql.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-mysql-secret
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: "tcp://mysql.example.com:3306"

  - it: should inject DB_PASSWORD into db-seed for postgresql
    set:
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-pg-secret
      database.passwordSecret.secretKey: dbpass
    asserts:
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-pg-secret
                key: dbpass

  - it: should inject DB_PASSWORD into config-init for postgresql
    set:
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-pg-secret
      database.passwordSecret.secretKey: dbpass
    asserts:
      - contains:
          path: spec.template.spec.initContainers[2].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-pg-secret
                key: dbpass

  - it: should set hardened securityContext on all init containers for postgresql
    set:
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: my-pg-secret
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.initContainers[1].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.initContainers[2].securityContext.runAsNonRoot
          value: true

  # ── PAT seed native sidecar (SQLite only) ──────────────────────────

  - it: should have only one container (server) when pat is disabled
    set:
      pat.enabled: false
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should have only one container (server) even with pat enabled for sqlite
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should add pat-seed and api-provision native sidecars as init containers for sqlite
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 3
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: config-init
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: pat-seed
      - equal:
          path: spec.template.spec.initContainers[2].name
          value: api-provision

  - it: should set restartPolicy Always on pat-seed native sidecar
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].restartPolicy
          value: Always

  - it: should use initium image for pat-seed sidecar
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: "ghcr.io/kitstream/initium:2.1.0"

  - it: should run seed command with --sidecar flag in pat-seed sidecar
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].args
          value:
            - --sidecar
            - seed
            - --spec
            - /spec/pat-seed.yaml

  - it: should inject PAT_TOKEN into sidecar
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      pat.secret.tokenKey: myToken
      database.type: sqlite
    asserts:
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: PAT_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-pat-secret
                key: myToken

  - it: should run sidecar as root for SQLite PVC access
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].securityContext.runAsUser
          value: 0
      - equal:
          path: spec.template.spec.initContainers[1].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.initContainers[1].securityContext.allowPrivilegeEscalation
          value: false

  - it: should mount pat-seed-config and data volumes on sidecar
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - contains:
          path: spec.template.spec.initContainers[1].volumeMounts
          content:
            name: pat-seed-config
            mountPath: /spec
            readOnly: true
      - contains:
          path: spec.template.spec.initContainers[1].volumeMounts
          content:
            name: data
            mountPath: /var/lib/netbird

  - it: should not add pat-seed sidecar for postgresql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 3
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: db-wait
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: db-seed
      - equal:
          path: spec.template.spec.initContainers[2].name
          value: config-init

  - it: should add pat-seed-config volume for sqlite pat sidecar
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: pat-seed-config
            configMap:
              name: RELEASE-NAME-netbird-server-pat-seed

  - it: should not add pat-seed-config volume when pat is disabled
    set:
      pat.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: pat-seed-config
          any: true

  - it: should not add pat-seed-config volume for postgresql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: pat-seed-config
          any: true

  - it: should include pat-seed checksum annotation for sqlite
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - exists:
          path: spec.template.metadata.annotations.checksum/pat-seed

  - it: should not include pat-seed checksum for postgresql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - notExists:
          path: spec.template.metadata.annotations.checksum/pat-seed

  # ── OIDC secret injection ────────────────────────────────────────────

  - it: should not inject IDP_CLIENT_SECRET when oidc is disabled
    asserts:
      - notContains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: IDP_CLIENT_SECRET
          any: true

  - it: should not inject PKCE_CLIENT_SECRET when oidc is disabled
    asserts:
      - notContains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: PKCE_CLIENT_SECRET
          any: true

  - it: should inject IDP_CLIENT_SECRET when idpManager is enabled
    set:
      oidc.enabled: true
      oidc.idpManager.enabled: true
      oidc.idpManager.managerType: "keycloak"
      oidc.idpManager.clientConfig.clientSecret.secretName: my-idp-secret
      oidc.idpManager.clientConfig.clientSecret.secretKey: myKey
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: IDP_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-idp-secret
                key: myKey

  - it: should inject PKCE_CLIENT_SECRET when pkceAuthFlow uses secret ref
    set:
      oidc.enabled: true
      oidc.pkceAuthFlow.enabled: true
      oidc.pkceAuthFlow.providerConfig.clientSecret.secretName: my-pkce-secret
      oidc.pkceAuthFlow.providerConfig.clientSecret.secretKey: pkceKey
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: PKCE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-pkce-secret
                key: pkceKey

  - it: should not inject PKCE_CLIENT_SECRET when using plain-text secret
    set:
      oidc.enabled: true
      oidc.pkceAuthFlow.enabled: true
      oidc.pkceAuthFlow.providerConfig.clientSecret.value: "plain-secret"
    asserts:
      - notContains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: PKCE_CLIENT_SECRET
          any: true

  - it: should not change init container count when oidc is enabled with sqlite
    set:
      oidc.enabled: true
      oidc.idpManager.enabled: true
      oidc.idpManager.clientConfig.clientSecret.secretName: my-secret
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: config-init

  # ── Other deployment settings ────────────────────────────────────────

  - it: should set resource limits when specified
    set:
      server.resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi

  - it: should set node selector
    set:
      server.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            disktype: ssd

  - it: should set tolerations
    set:
      server.tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "netbird"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "dedicated"
            operator: "Equal"
            value: "netbird"
            effect: "NoSchedule"

  - it: should set pod security context
    set:
      server.podSecurityContext:
        runAsUser: 1000
        fsGroup: 2000
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            runAsUser: 1000
            fsGroup: 2000

  - it: should set container security context
    set:
      server.securityContext:
        readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            readOnlyRootFilesystem: true

  - it: should not include relay sidecar container by default
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: server

  - it: should add relay sidecar container when relays.enabled and embedded.enabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: relay
      - matchRegex:
          path: spec.template.spec.containers[1].image
          pattern: "^netbirdio/relay:.+$"
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: NB_LISTEN_ADDRESS
            value: ":33080"
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: NB_HEALTH_LISTEN_ADDRESS
            value: ":9001"
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: NB_METRICS_PORT
            value: "9091"
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: NB_EXPOSED_ADDRESS
            value: "rels://netbird.example.com:443/relay"
      - contains:
          path: spec.template.spec.containers[1].ports
          content:
            name: relay
            containerPort: 33080
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[1].ports
          content:
            name: relay-health
            containerPort: 9001
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[1].ports
          content:
            name: relay-metrics
            containerPort: 9091
            protocol: TCP
      - equal:
          path: spec.template.spec.containers[1].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[1].livenessProbe.httpGet.port
          value: relay-health
      - equal:
          path: spec.template.spec.containers[1].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[1].readinessProbe.httpGet.port
          value: relay-health

  - it: should not include relay sidecar when external-only mode
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: false
      server.config.relays.external:
        - "rels://relay-eu.example.com:443/relay"
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should reuse server authSecret Secret for relay sidecar NB_AUTH_SECRET
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.secrets.authSecret.secretName: my-existing-secret
      server.secrets.authSecret.secretKey: hmac
      server.secrets.authSecret.autoGenerate: false
    asserts:
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: NB_AUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: my-existing-secret
                key: hmac

  - it: should not set TLS env vars on relay sidecar by default
    set:
      server.config.exposedAddress: "https://nb.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[?(@.name=='relay')].env
          content:
            name: NB_TLS_CERT_FILE
      - notContains:
          path: spec.template.spec.containers[?(@.name=='relay')].env
          content:
            name: NB_LETSENCRYPT_DOMAINS

  - it: should set NB_TLS_CERT_FILE/NB_TLS_KEY_FILE when source=secret
    set:
      server.config.exposedAddress: "https://nb.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: true
      server.relaySidecar.tls.enabled: true
      server.relaySidecar.tls.source: secret
      server.relaySidecar.tls.secret.secretName: my-tls
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=='relay')].env
          content:
            name: NB_TLS_CERT_FILE
            value: /etc/relay-tls/tls.crt
      - contains:
          path: spec.template.spec.containers[?(@.name=='relay')].env
          content:
            name: NB_TLS_KEY_FILE
            value: /etc/relay-tls/tls.key
