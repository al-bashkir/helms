suite: server relay ingress tests
templates:
  - templates/server-relay-ingress.yaml
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
              pathType: ImplementationSpecific
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress

  - it: should have -relay suffix in name
    set:
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "-relay$"

  - it: should set host and paths
    set:
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
              pathType: ImplementationSpecific
            - path: /ws-proxy
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.rules[0].host
          value: netbird.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /relay
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: /ws-proxy

  - it: should set TLS
    set:
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
      server.ingressRelay.tls:
        - secretName: netbird-tls
          hosts:
            - netbird.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: netbird-tls

  - it: should route relay Ingress to relay port when sidecar enabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.name
          value: relay

  - it: should auto-inject ssl-passthrough annotations when relay TLS enabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: true
      server.relaySidecar.tls.enabled: true
      server.relaySidecar.tls.source: secret
      server.relaySidecar.tls.secret.secretName: my-tls
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
              pathType: ImplementationSpecific
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            nginx.ingress.kubernetes.io/ssl-passthrough: "true"
            nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

  - it: should not inject ssl-passthrough when relay TLS disabled
    set:
      server.ingressRelay.enabled: true
      server.ingressRelay.hosts:
        - host: netbird.example.com
          paths:
            - path: /relay
              pathType: ImplementationSpecific
    asserts:
      - notExists:
          path: metadata.annotations.nginx\.ingress\.kubernetes\.io/ssl-passthrough
