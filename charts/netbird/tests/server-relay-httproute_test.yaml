suite: server relay HTTPRoute tests
templates:
  - templates/server-relay-httproute.yaml
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute when enabled
    set:
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
      server.relayHttpRoute.rules:
        - matches:
            - path: { type: PathPrefix, value: /relay }
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute

  - it: should have -relay suffix in name
    set:
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "-relay$"

  - it: should pass path matches through
    set:
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
      server.relayHttpRoute.rules:
        - matches:
            - path: { type: PathPrefix, value: /relay }
            - path: { type: PathPrefix, value: /ws-proxy }
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /relay
      - equal:
          path: spec.rules[0].matches[1].path.value
          value: /ws-proxy

  - it: should default relay HTTPRoute backendRefs to port 80 when sidecar disabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
          namespace: gw
      server.relayHttpRoute.hostnames:
        - "netbird.example.com"
      server.relayHttpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /relay
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should switch relay HTTPRoute backendRefs to sidecar listenPort when sidecar enabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
          namespace: gw
      server.relayHttpRoute.hostnames:
        - "netbird.example.com"
      server.relayHttpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /relay
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 33080

  - it: should still render normally when relay TLS is disabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.config.relays.embedded.enabled: true
      server.relayHttpRoute.enabled: true
      server.relayHttpRoute.parentRefs:
        - name: gw
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
