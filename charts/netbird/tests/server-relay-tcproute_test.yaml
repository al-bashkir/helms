suite: server relay TCPRoute tests
templates:
  - templates/server-relay-tcproute.yaml
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render TCPRoute when enabled
    set:
      server.relayTcpRoute.enabled: true
      server.relayTcpRoute.parentRefs:
        - name: gw
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: TCPRoute
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1alpha2

  - it: should have -relay-tcp suffix in name
    set:
      server.relayTcpRoute.enabled: true
      server.relayTcpRoute.parentRefs:
        - name: gw
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "-relay-tcp$"

  - it: should default to a single backend rule when rules omitted
    set:
      server.relayTcpRoute.enabled: true
      server.relayTcpRoute.parentRefs:
        - name: gw
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-netbird-server
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should pass user backendRefs through
    set:
      server.relayTcpRoute.enabled: true
      server.relayTcpRoute.parentRefs:
        - name: gw
      server.relayTcpRoute.rules:
        - backendRefs:
            - name: custom
              port: 9000
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: custom
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9000

  - it: should default relay TCPRoute backendRefs to port 80 when sidecar disabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.relayTcpRoute.enabled: true
      server.relayTcpRoute.parentRefs:
        - name: gw
          namespace: gw
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should switch relay TCPRoute backendRefs to sidecar listenPort when sidecar enabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.relayTcpRoute.enabled: true
      server.relayTcpRoute.parentRefs:
        - name: gw
          namespace: gw
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 33080
