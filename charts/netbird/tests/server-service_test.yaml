suite: server service tests
templates:
  - templates/server-service.yaml
tests:
  - it: should render a Service
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service

  - it: should use ClusterIP type by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose http port 80
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should use custom service type
    set:
      server.service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: should use custom port
    set:
      server.service.port: 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP

  - it: should include selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server

  - it: should not include relay port in service by default
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 1
      - notContains:
          path: spec.ports
          content:
            name: relay

  - it: should include relay port when sidecar is enabled
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 2
      - contains:
          path: spec.ports
          content:
            name: relay
            port: 33080
            targetPort: relay
            protocol: TCP

  - it: should respect custom relaySidecar.listenPort
    set:
      server.config.exposedAddress: "https://netbird.example.com:443"
      server.config.relays.enabled: true
      server.relaySidecar.listenPort: 35000
    asserts:
      - contains:
          path: spec.ports
          content:
            name: relay
            port: 35000
            targetPort: relay
            protocol: TCP
