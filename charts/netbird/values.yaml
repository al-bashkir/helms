# -- Global settings

# -- Override the chart name used in resource names and labels.
# By default, the chart name "netbird" is used. Set this to replace only the
# chart name portion of generated resource names (e.g. "my-nb" produces "release-my-nb-server").
nameOverride: ""

# -- Fully override the generated resource name prefix.
# When set, this value is used directly as the base name for all resources
# (e.g. "my-netbird" produces "my-netbird-server", "my-netbird-dashboard").
# Takes precedence over nameOverride.
fullnameOverride: ""

# -- ServiceAccount configuration for all pods in this chart.
serviceAccount:
  # -- Whether to create a ServiceAccount resource.
  create: true
  # -- Annotations to add to the created ServiceAccount.
  annotations: {}
  # -- The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated from the fullname template.
  name: ""

# -- Global image pull secrets applied to all pods when component-level
# imagePullSecrets are not set. Each entry is a map with a "name" key
# referencing a Kubernetes docker-registry secret.
imagePullSecrets: []

# =============================================================================
# Database Configuration
# =============================================================================
# Structured database connection parameters. The chart constructs the
# internal DSN from these fields — you never need to build a DSN string.
#
# For sqlite, only `database.type` is needed (no host/port/user/password).
# For postgresql and mysql, the chart:
#   1. Waits for the database to be reachable (Initium wait-for)
#   2. Creates the database if it doesn't exist (Initium seed)
#   3. Constructs the DSN and renders it into the server config
# =============================================================================
database:
  # -- Database engine. Options: sqlite, postgresql, mysql.
  type: "sqlite"

  # -- Database hostname. Required for postgresql and mysql.
  host: ""

  # -- Database port. Defaults to 5432 for postgresql, 3306 for mysql.
  # Ignored for sqlite.
  port: ""

  # -- Database user. Required for postgresql and mysql.
  user: ""

  # -- Database name. Required for postgresql and mysql.
  name: ""

  # -- Kubernetes Secret containing the database password.
  # Required for postgresql and mysql. Ignored for sqlite.
  #
  # Example Secret:
  #   apiVersion: v1
  #   kind: Secret
  #   metadata:
  #     name: netbird-db-password
  #   type: Opaque
  #   stringData:
  #     password: "s3cret"
  passwordSecret:
    # -- Name of the Kubernetes Secret containing the password.
    secretName: ""
    # -- Key within the Secret that holds the password value.
    secretKey: "password"

  # -- SSL mode for PostgreSQL connections (e.g. disable, require, verify-ca,
  # verify-full). Ignored for mysql and sqlite.
  sslMode: "disable"

# =============================================================================
# OIDC / SSO Configuration
# =============================================================================
# Structured OIDC configuration for integrating with external identity
# providers. When oidc.enabled is true, the chart renders HttpServerConfig,
# DeviceAuthorizationFlow, PKCEAuthorizationFlow, and IdpManagerConfig
# sections into the server config.yaml.
#
# Supported providers: keycloak, auth0, azure, zitadel, okta, authentik,
# google, jumpcloud, dex, embedded.
#
# Secret values (IdP client secret, PKCE client secret) are injected via
# Kubernetes Secrets using the existing Initium render pipeline — they never
# appear in ConfigMaps.
# =============================================================================
oidc:
  # -- Enable OIDC configuration. When true, the chart renders IdP manager,
  # device auth flow, and PKCE flow settings into the server config.
  enabled: false

  # -- The audience claim expected in JWT tokens (HttpServerConfig.AuthAudience).
  # Often the OIDC client ID or a custom API identifier.
  audience: ""

  # -- The JWT claim used to identify the user (HttpServerConfig.AuthUserIDClaim).
  # Common values: "sub" (default), "email", "oid" (Azure).
  userIdClaim: ""

  # -- OIDC configuration endpoint for auto-discovery
  # (HttpServerConfig.OIDCConfigEndpoint).
  # Usually "https://<issuer>/.well-known/openid-configuration".
  # Leave empty to let NetBird derive from auth.issuer.
  configEndpoint: ""

  # -- JWT keys location URL (HttpServerConfig.AuthKeysLocation).
  # If empty, NetBird auto-discovers from the OIDC config endpoint.
  authKeysLocation: ""

  # ── Device Authorization Flow (RFC 8628) — CLI clients ──────────────
  deviceAuthFlow:
    # -- Enable device authorization flow for CLI authentication.
    enabled: false
    # -- Provider name (e.g. "hosted", "none", "auth0", "azure").
    provider: "hosted"
    providerConfig:
      # -- OIDC client ID for the CLI/device application.
      clientId: ""
      # -- Client secret (usually empty for public clients).
      clientSecret: ""
      # -- Domain of the OIDC provider (e.g. "your-tenant.auth0.com").
      domain: ""
      # -- Audience for token validation.
      audience: ""
      # -- Override token endpoint (auto-discovered if empty).
      tokenEndpoint: ""
      # -- Override device authorization endpoint.
      deviceAuthEndpoint: ""
      # -- OAuth2 scopes to request.
      scope: "openid"
      # -- Use the ID token instead of the access token.
      useIdToken: false

  # ── PKCE Authorization Flow (RFC 7636) — dashboard/app clients ──────
  pkceAuthFlow:
    # -- Enable PKCE authorization flow for dashboard authentication.
    enabled: false
    providerConfig:
      # -- OIDC client ID for the dashboard application.
      clientId: ""
      # -- Client secret. If secretName is set, the value is injected via
      # secretKeyRef env var; otherwise the plain-text value is used.
      clientSecret:
        # -- Plain-text client secret (for public clients, leave empty).
        value: ""
        # -- Name of an existing Kubernetes Secret containing the client secret.
        secretName: ""
        # -- Key within the Secret.
        secretKey: "clientSecret"
      # -- Domain of the OIDC provider.
      domain: ""
      # -- Audience for token validation.
      audience: ""
      # -- Override authorization endpoint.
      authorizationEndpoint: ""
      # -- Override token endpoint.
      tokenEndpoint: ""
      # -- OAuth2 scopes to request.
      scope: "openid profile email"
      # -- Allowed redirect URLs for the PKCE flow.
      redirectUrls: []
      # -- Use the ID token instead of the access token.
      useIdToken: false
      # -- Disable the login prompt even if the user has an active session.
      disablePromptLogin: false
      # -- Login flag value (0 = default, see NetBird docs).
      loginFlag: 0

  # ── IdP Manager — server-side user/group management ─────────────────
  idpManager:
    # -- Enable IdP manager for server-side user sync.
    enabled: false
    # -- Manager type: "keycloak", "auth0", "azure", "zitadel", "okta",
    #    "authentik", "google", "jumpcloud", "dex", "embedded".
    #    Use "embedded" for NetBird's built-in IdP (no external provider
    #    required). With embedded mode, users are managed through the
    #    dashboard's /setup endpoint. Set server.config.auth.issuer to
    #    "https://<your-domain>/oauth2".
    managerType: ""
    clientConfig:
      # -- OIDC issuer URL (often same as server.config.auth.issuer).
      issuer: ""
      # -- Token endpoint for management API access.
      tokenEndpoint: ""
      # -- Client ID for the management API application.
      clientId: ""
      # -- Kubernetes Secret containing the management API client secret.
      clientSecret:
        # -- Name of the Secret.
        secretName: ""
        # -- Key within the Secret.
        secretKey: "clientSecret"
      # -- OAuth2 grant type (usually "client_credentials").
      grantType: "client_credentials"
    # -- Provider-specific extra configuration (key-value map).
    # Passed as-is to the IdP manager. Keys depend on managerType.
    extraConfig: {}
    # -- Provider-specific credentials map. Rendered under the matching
    # YAML key based on managerType (e.g. auth0ClientCredentials,
    # azureClientCredentials, keycloakClientCredentials, etc.).
    providerConfig: {}

# =============================================================================
# =============================================================================
# PAT (Personal Access Token) Seeding
# =============================================================================
# Optionally seed the NetBird database with a Personal Access Token after
# deployment. This enables immediate API access without manual token creation.
#
# Prerequisites:
#   1. Generate a PAT token (see README for instructions)
#   2. Create a Kubernetes Secret with the token:
#
#      kubectl create secret generic netbird-pat \
#        --from-literal=token='nbp_...' \
#        -n netbird
#
# The SHA256 hash required by the database is computed automatically at
# seed time by Initium (v1.0.4+) — you only need to supply the plaintext token.
# =============================================================================
pat:
  # -- Enable PAT seeding. When true, a post-install Job inserts a
  # Personal Access Token into the database.
  enabled: false

  # -- Kubernetes Secret containing the PAT token.
  secret:
    # -- Name of the existing Secret holding the plaintext PAT.
    secretName: ""
    # -- Key in the Secret holding the plaintext PAT (e.g. "nbp_...").
    tokenKey: "token"

  # -- Display name for the seeded PAT.
  name: "helm-seeded-token"

  # -- User ID to associate the PAT with. A service user with this ID
  # will be created if it does not exist.
  userId: "helm-seed-user"

  # -- Account ID for the seeded user. An account with this ID will be
  # created if it does not exist.
  accountId: "helm-seed-account"

  # -- PAT expiration in days from the time of deployment.
  expirationDays: 365

# Combined NetBird Server (Management + Signal + Relay + STUN)
# =============================================================================
server:
  # -- Number of server pod replicas.
  replicaCount: 1

  # -- Container image configuration for the combined NetBird server.
  image:
    # -- Image repository.
    repository: netbirdio/netbird-server
    # -- Image tag. Defaults to the Chart's appVersion if not set.
    tag: ""
    # -- Image pull policy.
    pullPolicy: IfNotPresent

  # -- Init container image used for config rendering, database readiness
  # checks, and database creation.
  #
  # Initium (https://github.com/KitStream/initium) provides:
  #   - `render`   — envsubst-based config template rendering
  #   - `wait-for` — TCP/HTTP readiness probes with retry
  #   - `seed`     — declarative database/schema creation
  #
  # The init container runs non-root (UID 65534) with a read-only
  # filesystem, no capabilities, and no shell (FROM scratch).
  initImage:
    # -- Init container image repository.
    repository: ghcr.io/kitstream/initium
    # -- Init container image tag.
    tag: "2.1.0"

  # -- Component-level image pull secrets.
  imagePullSecrets: []

  # ---------------------------------------------------------------------------
  # Server config.yaml — structured fields
  #
  # These fields are rendered into a config.yaml.tpl template stored in a
  # ConfigMap. At pod startup, Initium's render subcommand substitutes
  # ${VAR} placeholders with secret values from Kubernetes Secrets,
  # producing the final config.yaml. User-supplied values below are
  # automatically escaped so that any "$" characters are preserved.
  #
  # See: https://docs.netbird.io/selfhosted/configuration-files
  # ---------------------------------------------------------------------------
  config:
    # -- The address and port the combined server listens on inside the container.
    listenAddress: ":80"

    # -- The public-facing URL where peers connect to the server.
    # Format: "https://hostname:port" — the port is REQUIRED, even when
    # it matches the scheme default (443 for https, 80 for http).
    # NetBird clients build their gRPC dial target from this URL using
    # Go's net/url parser; without an explicit port the daemon fails
    # with "missing port in address". The chart enforces this with a
    # fail-fast template validation.
    # Distributed to peers and must be reachable from all clients.
    exposedAddress: ""

    # -- List of UDP ports for the embedded STUN server.
    # These ports must also be exposed via the stunService. STUN uses UDP
    # which cannot be proxied by standard HTTP ingress controllers — see
    # the "STUN Networking" section in README.md for setup options.
    stunPorts:
      - 3478

    # -- Port to expose the Prometheus metrics endpoint (/metrics).
    metricsPort: 9090

    # -- Address for the health check endpoint (/health).
    # Used by Kubernetes probes and load balancers.
    healthcheckAddress: ":9000"

    # -- Log verbosity. Options: debug, info, warn, error.
    logLevel: "info"

    # -- Where to write log output. Use "console" for stdout (recommended
    # in containers) or specify a file path.
    logFile: "console"

    # -- Data directory path where the server stores its database and state files.
    dataDir: "/var/lib/netbird"

    # -- Authentication / embedded IdP settings.
    auth:
      # -- The OAuth2/OIDC issuer URL. Used to validate JWT tokens; must be
      # accessible to clients. For an external provider, use the provider's
      # issuer URL (e.g. "https://keycloak.example.com/realms/netbird").
      # For NetBird's built-in (embedded) IdP, set to
      # "https://<your-domain>/oauth2" and enable oidc.idpManager with
      # managerType: "embedded".
      issuer: ""

      # -- Enable automatic refresh of IdP signing keys. Recommended: true.
      signKeyRefreshEnabled: true

      # -- Allowed redirect URIs for the dashboard OAuth2 authorization flow.
      # Typically "/nb-auth" and "/nb-silent-auth" on your domain.
      dashboardRedirectURIs: []
      #  - "https://netbird.example.com/nb-auth"
      #  - "https://netbird.example.com/nb-silent-auth"

      # -- Redirect URIs for CLI-based authentication.
      cliRedirectURIs:
        - "http://localhost:53000/"

    # ── Relays (external + embedded sidecar) ────────────────────────────
    # Render the management `relays:` block in config.yaml. When the block
    # is rendered, the netbird-server's built-in relay subcomponent is
    # disabled (upstream behavior — see
    # https://github.com/netbirdio/netbird/blob/main/combined/config.yaml.example).
    # Use `relays.embedded.enabled` to deploy a standalone netbird-relay
    # sidecar in the server pod that takes its place. Leave
    # `relays.enabled=false` (default) to keep the legacy combined-server
    # relay (the current chart behavior — no relays: block rendered, peer
    # relay handoff is signed via server.secrets.authSecret).
    relays:
      # -- Render the `relays:` block in config.yaml. When false, the
      # management server uses its built-in relay subcomponent (legacy
      # behavior).
      enabled: false

      embedded:
        # -- Deploy the netbird-relay sidecar in the server pod and
        # advertise its URL alongside any external entries. Disabling the
        # sidecar with relays.enabled=true switches the deployment to
        # external-only — peers will not be able to reach a relay served
        # from this chart.
        enabled: true
        # -- Override the URL advertised for the sidecar.
        # When empty, derived from server.config.exposedAddress by
        # swapping https:// → rels:// (or http:// → rel://) and appending
        # /relay. Example: "rels://relay.example.com:443/relay"
        address: ""

      # -- Additional external relay servers to advertise. Each entry must
      # include scheme (rels:// or rel://) and an explicit port. Example:
      #   - "rels://relay-eu.example.com:443/relay"
      #   - "rels://relay-us.example.com:443/relay"
      external: []

      # -- Lifetime of HMAC-signed relay credentials issued to peers.
      # Go duration format (e.g. "24h", "1h30m"). The standalone
      # netbird-relay sidecar hardcodes its own validator at 24h, so values
      # longer than 24h have no effect on the sidecar.
      credentialsTTL: "24h"

  # ── Relay sidecar container ─────────────────────────────────────────
  # Only deployed when both server.config.relays.enabled and
  # server.config.relays.embedded.enabled are true.
  relaySidecar:
    image:
      # -- Sidecar image repository.
      repository: netbirdio/relay
      # -- Sidecar image tag. Defaults to .Chart.AppVersion when empty so
      # the sidecar tracks the combined-server image version.
      tag: ""
      # -- Image pull policy.
      pullPolicy: IfNotPresent
    # -- Container listen port for the relay WSS endpoint. Exposed on the
    # server Service as the named port "relay".
    listenPort: 33080
    # -- Container healthcheck port. Must differ from the main server's
    # 9000.
    healthcheckPort: 9001
    # -- Container Prometheus metrics port. Must differ from the main
    # server's `server.config.metricsPort` (default 9090) since both
    # containers share the pod network namespace.
    metricsPort: 9091
    # -- CPU/memory resource requests and limits.
    resources: {}
    # -- Container security context.
    securityContext: {}
    # -- Liveness probe override for the relay sidecar.
    # When empty, the chart picks a default based on `tls.enabled`:
    # - tls.enabled=true  → tcpSocket on the `relay` listen port
    #   (bootstrap-safe — does not depend on the relay's `/health`
    #   endpoint being able to dial the publicly advertised URL).
    # - tls.enabled=false → httpGet `/health` on the `relay-health`
    #   port (preserves end-to-end /health validation).
    # Provide a non-empty map to override the default verbatim.
    livenessProbe: {}
    # -- Readiness probe override for the relay sidecar.
    # Same default selection rules as `livenessProbe`.
    readinessProbe: {}
    # -- TLS configuration for the relay sidecar's WSS+QUIC listener.
    # When enabled, the sidecar listens TLS on `listenPort` for both TCP
    # (WSS) and UDP (QUIC). The advertised relay URL is forced to
    # `rels://<host>:443/relay`. Disabled by default — backwards-compatible.
    tls:
      # -- Enable in-process TLS in the relay sidecar. Required to start
      # the QUIC listener; silences upstream "Not starting QUIC listener"
      # warning. Also auto-rewrites `ingressRelay` to nginx
      # `ssl-passthrough` and forces the advertised URL to `rels://`.
      enabled: false
      # -- Source of the cert/key material. Options:
      # `secret` (BYO `kubernetes.io/tls` Secret, e.g. cert-manager) or
      # `letsencrypt` (sidecar's built-in ACME client).
      source: secret
      secret:
        # -- Name of an existing `kubernetes.io/tls` Secret containing
        # `tls.crt` and `tls.key`. Required when `source=secret`.
        secretName: ""
        # -- Key in the Secret holding the PEM-encoded certificate.
        certKey: tls.crt
        # -- Key in the Secret holding the PEM-encoded private key.
        keyKey: tls.key
      letsencrypt:
        # -- Comma-separated FQDNs the relay registers with Let's Encrypt.
        # Required when `source=letsencrypt`.
        domains: []
        # -- ACME registration email. Required when `source=letsencrypt`.
        email: ""
        # -- Persistent directory for the LE cert cache. Mounted as a
        # sub-path on the existing server PVC. Survives pod restarts so
        # LE rate limits are not exhausted.
        dataDir: /var/lib/netbird/relay-letsencrypt
        # -- Use the AWS Route53 DNS-01 challenge instead of HTTP-01.
        # Sets `NB_LETSENCRYPT_AWS_ROUTE53=true` on the sidecar.
        awsRoute53: false

  # ---------------------------------------------------------------------------
  # Secret references — sensitive config.yaml values
  #
  # The ConfigMap stores a config.yaml.tpl template that uses envsubst
  # ${VAR} syntax for secret placeholders. At pod startup the Initium
  # init container reads secret values via secretKeyRef env vars and runs
  # its `render` subcommand to produce the final config.yaml.
  #
  # Auto-generation:
  #   Set autoGenerate: true (and leave secretName empty) to have this chart
  #   create a Secret on first install (via Helm's randBytes 32). The Secret
  #   carries "helm.sh/resource-policy: keep" so it survives uninstall/upgrade.
  # ---------------------------------------------------------------------------
  secrets:
    # -- Shared authentication secret for relay credential validation.
    # Value: base64-encoded 32 random bytes (openssl rand -base64 32).
    authSecret:
      # -- Name of an existing Kubernetes Secret. Leave empty to auto-generate.
      secretName: ""
      # -- Key within the Secret.
      secretKey: "authSecret"
      # -- Auto-generate on first install.
      autoGenerate: true

    # -- Encryption key for sensitive data at rest. Must be exactly 32 bytes.
    # Value: base64-encoded 32 random bytes (openssl rand -base64 32).
    storeEncryptionKey:
      # -- Name of an existing Kubernetes Secret. Leave empty to auto-generate.
      secretName: ""
      # -- Key within the Secret.
      secretKey: "encryptionKey"
      # -- Auto-generate on first install.
      autoGenerate: true

  # -- Persistent volume for server data.
  persistentVolume:
    # -- Whether to create a PersistentVolumeClaim.
    enabled: true
    # -- Storage class name. Leave empty for the cluster default.
    storageClass: ""
    # -- Access modes for the PVC.
    accessModes:
      - ReadWriteOnce
    # -- Requested storage size.
    size: 1Gi
    # -- Additional annotations on the PVC.
    annotations: {}

  # -- STUN UDP port the server listens on inside the container.
  stunPort: 3478

  # -- Primary service exposing the combined HTTP port.
  service:
    type: ClusterIP
    port: 80
    # -- Append a UDP port for relay QUIC traffic to the main server
    # Service. Useful for sharing a single LoadBalancer IP across HTTP,
    # relay TCP, and relay QUIC. Only meaningful when
    # `service.type=LoadBalancer` AND `relaySidecar.tls.enabled=true`.
    # Default `0` disables.
    relayQuicUdpPort: 0

  # -- Dedicated service for the STUN/TURN UDP port.
  # STUN uses UDP which cannot go through a standard HTTP ingress, so this
  # service gets its own external IP by default (LoadBalancer). To use a
  # single DNS entry, assign a shared static IP via annotations. See the
  # "STUN Networking" section in README.md for detailed options.
  stunService:
    type: LoadBalancer
    port: 3478
    # -- Optional nodePort for NodePort service type (valid range: 30000–32767).
    # Omit or set to null to let Kubernetes allocate automatically.
    nodePort: null
    annotations: {}

  # -- Ingress for HTTP routes (API + OAuth2).
  # Mutually exclusive with server.httpRoute.
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts: []
    tls: []

  # -- Gateway API HTTPRoute for HTTP routes (API + OAuth2).
  # Mutually exclusive with server.ingress. TLS is terminated at the Gateway
  # listener, so no tls block here. parentRefs and hostnames are required
  # when enabled. rules pass through verbatim to HTTPRoute.spec.rules;
  # backendRefs are auto-filled from the netbird server Service when a rule
  # omits them.
  httpRoute:
    enabled: false
    parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-system
    #   sectionName: https
    hostnames: []
    rules: []
    # - matches:
    #     - path: { type: PathPrefix, value: /api }
    #     - path: { type: PathPrefix, value: /oauth2 }
    annotations: {}
    labels: {}

  # -- Ingress for gRPC routes (signal + management gRPC).
  # Mutually exclusive with server.grpcRoute. Requires TLS: standard
  # nginx-ingress cannot negotiate HTTP/2 cleartext (h2c) and
  # `ssl-redirect: "true"` (set by default in this block) will redirect
  # plaintext gRPC to HTTPS. For plaintext h2c, use server.grpcRoute with a
  # Gateway API controller that supports it (Envoy Gateway, Traefik, …).
  ingressGrpc:
    enabled: false
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts: []
    tls: []

  # -- Gateway API GRPCRoute for gRPC routes (signal + management).
  # Mutually exclusive with server.ingressGrpc. Gateway controllers forward
  # gRPC over HTTP/2 — including plaintext h2c — so this works without TLS
  # when the Gateway listener is HTTP. rules pass through to
  # GRPCRoute.spec.rules; backendRefs are auto-filled when omitted.
  grpcRoute:
    enabled: false
    parentRefs: []
    hostnames: []
    rules: []
    # - matches:
    #     - method: { service: signalexchange.SignalExchange }
    #     - method: { service: management.ManagementService }
    annotations: {}
    labels: {}

  # -- Ingress for relay and WebSocket routes.
  # Mutually exclusive with server.relayHttpRoute and server.relayTcpRoute.
  ingressRelay:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts: []
    tls: []

  # -- Gateway API HTTPRoute for relay + WebSocket.
  # Default choice for Gateway API — WebSocket uses HTTP/1.1 Upgrade which
  # HTTPRoute handles natively. Mutually exclusive with server.ingressRelay
  # and server.relayTcpRoute.
  relayHttpRoute:
    enabled: false
    parentRefs: []
    hostnames: []
    rules: []
    # - matches:
    #     - path: { type: PathPrefix, value: /relay }
    #     - path: { type: PathPrefix, value: /ws-proxy }
    annotations: {}
    labels: {}

  # -- Gateway API TCPRoute for relay exposed as raw TCP.
  # Alternative to relayHttpRoute for deployments that front relay with a
  # dedicated TCP listener (no HTTP path matching). TCPRoute is v1alpha2.
  # Mutually exclusive with server.ingressRelay and server.relayHttpRoute.
  relayTcpRoute:
    enabled: false
    parentRefs: []
    rules: []
    # - backendRefs:
    #     - name: <auto>
    #       port: 80
    annotations: {}
    labels: {}

  # -- Dedicated UDP Service for the relay sidecar's QUIC listener.
  # Mirrors `stunService` — typically `LoadBalancer` so peers can reach
  # UDP/443 directly. Only meaningful when `relaySidecar.tls.enabled=true`.
  relayUdpService:
    # -- Whether to render the dedicated UDP Service.
    enabled: false
    # -- Service type. Options: LoadBalancer, NodePort, ClusterIP.
    type: LoadBalancer
    # -- Public service port advertised to peers.
    port: 443
    # -- Named container port the service targets. Resolved to the
    # sidecar's `relay-quic` UDP port.
    targetPort: relay-quic
    # -- Optional nodePort for NodePort service type (30000–32767).
    nodePort: null
    # -- Annotations to set on the Service.
    annotations: {}

  # -- Gateway API UDPRoute for relay QUIC. Mirrors `relayTcpRoute`.
  # `backendRefs` are auto-filled from the dedicated UDP Service when
  # a rule omits them. Requires a Gateway controller that supports
  # UDPRoute (e.g. Envoy Gateway).
  relayUdpRoute:
    enabled: false
    parentRefs: []
    rules: []
    annotations: {}
    labels: {}

  # -- CPU/memory resource requests and limits.
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    tcpSocket:
      port: http
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    tcpSocket:
      port: http

# =============================================================================
# Dashboard
# =============================================================================
dashboard:
  replicaCount: 1

  image:
    repository: netbirdio/dashboard
    tag: "v2.32.4"
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  config:
    mgmtApiEndpoint: ""
    mgmtGrpcApiEndpoint: ""
    authAudience: "netbird-dashboard"
    authClientId: "netbird-dashboard"
    authAuthority: ""
    useAuth0: "false"
    authSupportedScopes: "openid profile email groups"
    authRedirectUri: "/nb-auth"
    authSilentRedirectUri: "/nb-silent-auth"
    nginxSslPort: "443"
    letsencryptDomain: "none"

  secrets:
    authClientSecret:
      value: ""
      secretName: ""
      secretKey: "clientSecret"

  extraEnv: []

  service:
    type: ClusterIP
    port: 80

  # -- Ingress for the dashboard web UI.
  # Mutually exclusive with dashboard.httpRoute.
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts: []
    tls: []

  # -- Gateway API HTTPRoute for the dashboard web UI.
  # Mutually exclusive with dashboard.ingress. TLS is terminated at the
  # Gateway listener. rules pass through; backendRefs auto-filled when
  # omitted.
  httpRoute:
    enabled: false
    parentRefs: []
    hostnames: []
    rules: []
    # - matches:
    #     - path: { type: PathPrefix, value: / }
    annotations: {}
    labels: {}

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
